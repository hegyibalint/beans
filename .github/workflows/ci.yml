name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Caches the cargo registry and target/ keyed on Cargo.lock + toolchain.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # beans-test-jdks downloads a pinned Temurin on a cold cache; persist it
      # across runs so only the first run (or a patch bump) pays the network.
      - name: Cache test JDKs
        uses: actions/cache@v4
        with:
          path: ~/.cache/beans/test-jdks
          key: beans-test-jdks-${{ runner.os }}

      - name: Test
        run: cargo test --workspace
